services:
  toolshub:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: hazenco-toolshub
    restart: always
    ports:
      - "5052:5052"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TZ=Europe/Amsterdam
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5052/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
